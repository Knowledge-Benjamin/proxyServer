name: Deploy CC Proxy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      

      - name: Create HF Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import HfApi; import os; HfApi(token=os.environ['HF_TOKEN']).create_repo(repo_id='KnowledgeBenji/cc-proxy-v2', repo_type='space', space_sdk='docker', exist_ok=True)"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://KnowledgeBenji:${HF_TOKEN}@huggingface.co/spaces/KnowledgeBenji/cc-proxy-v2
          git push hf main --force
